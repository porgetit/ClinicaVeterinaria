<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterinaria - Sistema de Gestión</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div class="login-card">
            <h3 class="mb-4 text-center">Clínica Veterinaria</h3>
            <p class="text-muted text-center mb-4">Ingrese sus credenciales de administrador</p>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" id="username" class="form-control minimal-input" value="admin" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control minimal-input" value="admin123" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
            </form>
            <div id="login-error" class="alert alert-danger mt-3 hidden">Credenciales inválidas</div>
        </div>
    </div>

    <!-- App Layout (Initially Hidden) -->
    <div id="app-layout" class="hidden">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="px-4 mb-5">
                <h4 class="fw-bold">VET ADMIN</h4>
            </div>
            <div class="nav flex-column">
                <a class="nav-link active" href="#" data-view="dashboard">
                    <i class="bi bi-grid-1x2 me-2"></i> Dashboard
                </a>
                <a class="nav-link" href="#" data-view="clientes">
                    <i class="bi bi-people me-2"></i> Clientes
                </a>
                <a class="nav-link" href="#" data-view="mascotas">
                    <i class="bi bi-dog me-2"></i> Mascotas
                </a>
                <a class="nav-link" href="#" data-view="consultas">
                    <i class="bi bi-calendar-check me-2"></i> Citas
                </a>
                <a class="nav-link" href="#" data-view="facturacion">
                    <i class="bi bi-receipt me-2"></i> Facturación
                </a>
                <hr class="mx-4 my-4">
                <a class="nav-link text-danger" href="#" id="logout-btn">
                    <i class="bi bi-box-arrow-right me-2"></i> Salir
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <h2 id="view-title">Dashboard</h2>
                <div class="user-profile">
                    <span id="user-display" class="badge bg-light text-dark p-2">Admin</span>
                </div>
            </header>

            <div id="view-container">
                <!-- Content will be injected here -->
                <div id="dashboard-view">
                    <div class="row g-4">
                        <div class="col-md-3">
                            <div class="card p-4">
                                <h6 class="text-muted">Clientes Totales</h6>
                                <h2 id="count-clientes">0</h2>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card p-4">
                                <h6 class="text-muted">Mascotas Activas</h6>
                                <h2 id="count-mascotas">0</h2>
                            </div>
                        </div>
                        <!-- ... more cards ... -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Modal Cliente -->
    <div class="modal fade" id="cliente-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="cliente-form">
                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input type="text" id="cli-nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Documento / DNI</label>
                            <input type="text" id="cli-documento" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Teléfono</label>
                            <input type="text" id="cli-telefono" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="cli-email" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dirección</label>
                            <input type="text" id="cli-direccion" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveCliente()">Guardar Cliente</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Mascota -->
    <div class="modal fade" id="mascota-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva Mascota</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="mascota-form">
                        <div class="mb-3">
                            <label class="form-label">Nombre de la Mascota</label>
                            <input type="text" id="mas-nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Especie</label>
                            <input type="text" id="mas-especie" class="form-control" placeholder="Ej: Perro, Gato" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Raza</label>
                            <input type="text" id="mas-raza" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Fecha de Nacimiento</label>
                            <input type="date" id="mas-fecha" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Dueño (Opcional)</label>
                            <select id="mas-cliente" class="form-select">
                                <option value="">Sin dueño (Agregación)</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveMascota()">Guardar Mascota</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <strong class="me-auto">Sistema</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toast-message"></div>
        </div>
    </div>

    <!-- Bootstrap & App JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
